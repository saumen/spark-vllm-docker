# Recipe: Qwen3.5-122B-A10B-INT4-Autoround
# Qwen3.5-122B model in Intel INT4-Autoround quantization

recipe_version: "1"
name: Qwen3.5-122B-INT4-Autoround
description: vLLM serving Qwen3.5-122B-INT4-Autoround

# HuggingFace model to download (optional, for --download-model)
model: Intel/Qwen3.5-122B-A10B-int4-AutoRound
# model: RedHatAI/Qwen3.5-122B-A10B-NVFP4

solo_only: true

# Container image to use
container: vllm-node-20260720-220915

# Mod required to fix ROPE syntax error
mods:
  # - mods/fix-qwen3.5-autoround
  - mods/fix-qwen3.5-chat-template

# Default settings (can be overridden via CLI)
defaults:
  port: 8888
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 150000
  max_num_batched_tokens: 8192

# Speculative decoding notes:
#
# --speculative-config '{{"method":"dflash","model":"z-lab/Qwen3.5-122B-A10B-DFlash","num_speculative_tokens":2,"attention_backend":"FLASH_ATTN"}}'
# N=8 => ~20% acceptance rate, N=2 => ~75% accptance rate with avg ~25 tok/s generation
# On the other hand, native MTP yields ~50 tok/s on avg.

# Environment variables
env:
  VLLM_MARLIN_USE_ATOMIC_ADD: 1

# The vLLM serve command template
command: |
  vllm serve Intel/Qwen3.5-122B-A10B-int4-AutoRound \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --load-format fastsafetensors \
    --enable-prefix-caching \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_xml \
    --reasoning-parser qwen3 \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --enable-chunked-prefill \
    --async-scheduling \
    --kv-cache-metrics \
    --language-model-only \
    --skip-mm-profiling \
    --speculative-config '{{"method":"mtp","num_speculative_tokens":2}}'
    --trust-remote-code \
    --chat-template unsloth.jinja \
    --tensor-parallel-size {tensor_parallel} \
    --distributed-executor-backend ray
